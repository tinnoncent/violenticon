<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 230" role="img" aria-labelledby="title desc">
  <title id="title">VIOLENT ICON chromatic wordmark</title>
  <desc id="desc">Transparent VIOLENT ICON wordmark with cyan and red offset layers and a sharp ivory center.</desc>
  <defs>
    <filter id="redBlur" x="-15%" y="-35%" width="130%" height="170%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="cyanBlur" x="-15%" y="-35%" width="130%" height="170%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="ivory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf5"/>
      <stop offset=".45" stop-color="#efe7d3"/>
      <stop offset="1" stop-color="#bcb39f"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39f7ff"/>
      <stop offset=".5" stop-color="#e9e0ca"/>
      <stop offset="1" stop-color="#ff334f"/>
    </linearGradient>
  </defs>

  <g font-family="Arial Black, Helvetica Neue, Helvetica, Arial, sans-serif"
     font-size="142" font-weight="900" letter-spacing="27" text-anchor="middle">
    <text x="786" y="170" fill="#24eaff" opacity=".56" filter="url(#cyanBlur)">VIOLENT ICON</text>
    <text x="814" y="170" fill="#ff2d43" opacity=".56" filter="url(#redBlur)">VIOLENT ICON</text>

    <text x="784" y="170" fill="#17e6f4" opacity=".84">VIOLENT ICON</text>
    <text x="816" y="170" fill="#ff2946" opacity=".84">VIOLENT ICON</text>

    <text x="800" y="170"
          fill="url(#ivory)"
          stroke="#070707"
          stroke-width="3"
          paint-order="stroke fill">VIOLENT ICON</text>

    <text x="800" y="170"
          fill="none"
          stroke="url(#edge)"
          stroke-width="1.4"
          opacity=".92">VIOLENT ICON</text>
  </g>
</svg>
